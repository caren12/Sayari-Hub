<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sayari Hub</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            space1: '#020617',
            space2: '#071A3A',
            space3: '#0B2A5A'
          }
        }
      }
    }
  </script>
</head>

<body class="relative min-h-screen text-white bg-gradient-to-b from-space1 via-space2 to-space3">

<!-- BACKGROUND -->
<div class="fixed inset-0 z-0">
  <img src="https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3"
       class="w-full h-full object-cover opacity-20"/>
</div>

<div class="relative z-10">

  <!-- AUTH -->
  <div class="fixed top-4 right-4 z-50">
    <button onclick="document.getElementById('authBox').classList.toggle('hidden')"
      class="w-10 h-10 bg-gray-800 hover:bg-gray-700 rounded-full flex items-center justify-center">
      👤
    </button>

    <div id="authBox"
      class="hidden mt-2 w-72 bg-white/10 backdrop-blur-xl border border-blue-900/40 rounded-xl p-4">

      <h2 class="text-blue-200 font-bold mb-3">Account</h2>

      <input id="username" class="w-full p-2 mb-2 bg-black/40 rounded" placeholder="Username">
      <input id="email" class="w-full p-2 mb-2 bg-black/40 rounded" placeholder="Email">
      <input id="password" class="w-full p-2 mb-2 bg-black/40 rounded" placeholder="Password">

      <button onclick="signup()" class="w-full bg-gray-800 py-2 rounded mb-2">Sign Up</button>

      <hr class="border-gray-600 my-2">

      <input id="loginEmail" class="w-full p-2 mb-2 bg-black/40 rounded" placeholder="Login Email">
      <input id="loginPassword" class="w-full p-2 mb-2 bg-black/40 rounded" placeholder="Login Password">

      <button onclick="login()" class="w-full bg-gray-800 py-2 rounded">Login</button>
    </div>
  </div>

  <!-- HEADER -->
  <header class="text-center py-6 border-b border-blue-900/40">
    <h1 class="text-3xl font-bold text-blue-200">Sayari Hub</h1>
  </header>

  <!-- NAV -->
  <nav class="flex flex-wrap justify-center gap-3 p-4 bg-black/30 border-b border-blue-900/30">

    <button id="homeBtn" class="px-4 py-2 bg-gray-800 rounded-lg">Home</button>
    <button id="galleryBtn" class="px-4 py-2 bg-gray-800 rounded-lg">Gallery</button>
    <button id="factsBtn" class="px-4 py-2 bg-gray-800 rounded-lg">Facts</button>
    <button id="buddies" class="px-4 py-2 bg-gray-800 rounded-lg">Learning Buddies</button>
    <button id="startQuizBtn" class="px-4 py-2 bg-gray-700 rounded-lg">Start Quiz</button>

  </nav>

  <!-- MAIN -->
  <main class="p-4 space-y-8 max-w-5xl mx-auto">

    <!-- HOME -->
    <section id="homeSection">

      <div class="text-center mt-6">
        <h2 class="text-2xl font-bold text-blue-200 mb-4">
          NASA Image of the Day
        </h2>

        <img id="homeApodImage"
          class="w-full max-h-[400px] object-cover rounded-lg mb-4 border border-blue-900/40"/>

        <p id="homeApodExplanation" class="text-sm text-gray-300"></p>

        <button id="refreshApodBtn"
          class="mt-4 px-4 py-2 bg-gray-800 rounded-lg">
          Refresh Image
        </button>
      </div>

    </section>

    <!-- GALLERY -->
    <section id="gallerySection" style="display:none;">
      <div id="galleryGrid"
           class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
      </div>
    </section>

    <!-- FACTS -->
    <section id="factsSection" style="display:none;">
      <div class="flex flex-col items-center mt-10">

        <h2 class="text-3xl mb-6">🌌 Did You Know?</h2>

        <div id="factCard" class="bg-black/50 p-6 rounded-xl text-center max-w-xl">
          <p id="factText">Click below to load a fact 🚀</p>
        </div>

        <button id="nextFactBtn"
          class="mt-6 px-6 py-2 bg-indigo-600 rounded-xl">
          Next Fact
        </button>

      </div>
    </section>

    <!-- QUIZ -->
    <section id="quizSection" style="display:none;">
      <p id="difficulty" class="text-blue-300 mb-2"></p>
      <p id="question"></p>
      <div id="options"></div>
      <p id="result"></p>
      <p id="timer"></p>
    </section>

    <!-- BUDDIES -->
    <section id="buddiesSection" style="display:none;">
      <h2>👥 Learning Buddies</h2>

      <input id="buddyName" placeholder="Name">
      <input id="buddyInterest" placeholder="Interest">

      <button onclick="addBuddy()">Join Network</button>

      <div id="buddiesList"></div>
    </section>

  </main>
</div>

<!-- JS (IMPORTANT: MUST BE SAME FOLDER AS INDEX.HTML) -->
<script src="script.js"></script>

</body>
</html>
